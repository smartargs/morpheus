<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morpheus — AI Guide for Neo N3</title>
    <meta
      name="description"
      content="Advanced AI-powered guide for Neo N3 blockchain interactions"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <script>
      // Initialize theme before rendering
      (function () {
        const theme = localStorage.getItem("theme") || "dark";
        if (theme === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
  </head>
  <body
    class="h-full bg-white dark:bg-bg-primary text-slate-900 dark:text-text-primary"
  >
    <!-- Mobile Header -->
    <header
      class="lg:hidden fixed top-0 left-0 right-0 h-14 bg-white dark:bg-bg-sidebar border-b border-slate-200 dark:border-border z-50 flex items-center justify-between px-4"
    >
      <div class="flex items-center gap-2">
        <span class="text-neo-green-readable font-bold text-lg">◆</span>
        <span class="font-bold tracking-tight">Assistant</span>
      </div>

      <!-- Mobile Menu Toggle -->
      <button
        id="sidebar-toggle"
        class="w-10 h-10 flex items-center justify-center text-slate-500 dark:text-text-secondary hover:text-neo-green transition-all"
      >
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          ></path>
        </svg>
      </button>
    </header>

    <div class="flex h-full relative pt-14 lg:pt-0">
      <!-- Sidebar Overlay (mobile) -->
      <div
        id="sidebar-overlay"
        class="fixed inset-0 bg-slate-900/40 backdrop-blur-[2px] z-[60] lg:hidden hidden"
      ></div>

      <!-- Sidebar -->
      <nav
        class="lg:w-64 w-64 lg:static fixed inset-y-0 left-0 z-[70] bg-slate-50 dark:bg-bg-sidebar border-r border-slate-200 dark:border-border flex flex-col py-5 transition-transform duration-300 -translate-x-full lg:translate-x-0"
        id="sidebar"
      >
        <div
          class="flex items-center justify-between px-5 pb-6 border-b border-slate-200 dark:border-border mb-3"
        >
          <div class="flex items-center gap-2.5">
            <div
              class="text-2xl text-neo-green-readable drop-shadow-[0_0_6px_rgba(0,128,85,0.1)] dark:drop-shadow-[0_0_6px_rgba(0,229,153,0.3)]"
            >
              ◆
            </div>
            <span
              class="text-xl font-bold tracking-tight bg-gradient-to-br from-neo-green-readable to-[#00b377] dark:from-neo-green dark:to-[#66ffcc] bg-clip-text text-transparent"
              >Morpheus</span
            >
          </div>
          <button id="sidebar-close" class="lg:hidden text-slate-400">
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              ></path>
            </svg>
          </button>
        </div>
        <div class="px-3 mb-6">
          <div class="relative" id="new-chat-container">
            <div
              class="flex items-stretch shadow-lg shadow-neo-green/10 hover:shadow-neo-green/20 transition-all rounded-xl overflow-hidden"
            >
              <button
                id="global-new-chat-btn"
                class="flex-1 flex items-center justify-center gap-2 h-11 bg-neo-green text-black font-bold transition-all active:scale-[0.98] group"
              >
                <svg
                  class="w-4.5 h-4.5 transition-transform group-hover:rotate-90"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                >
                  <path d="M12 5v14M5 12h14" />
                </svg>
                <span class="text-[13.5px]">New Chat</span>
              </button>
              <div class="w-px h-6 self-center bg-black/10"></div>
              <button
                id="new-chat-dropdown-toggle"
                class="w-10 h-11 bg-neo-green text-black font-bold transition-all active:scale-[0.98] flex items-center justify-center"
              >
                <svg
                  class="w-4 h-4"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="m6 9 6 6 6-6" />
                </svg>
              </button>
            </div>

            <div
              id="new-chat-dropdown"
              class="absolute top-full left-0 right-0 mt-2 bg-white dark:bg-bg-card border border-slate-200 dark:border-border rounded-xl shadow-xl hidden z-[80] overflow-hidden animate-fade-slide"
            >
              <div class="p-1.5 flex flex-col gap-1">
                <button
                  class="new-chat-opt w-full flex items-center gap-2.5 px-3 py-2.5 rounded-lg hover:bg-slate-100 dark:hover:bg-white/5 transition-all text-[13px] font-bold text-slate-700 dark:text-text-primary"
                  data-network="mainnet"
                >
                  <span
                    class="w-1.5 h-1.5 rounded-full"
                    style="background-color: #ef4444"
                  ></span>
                  <span>Mainnet</span>
                </button>
                <button
                  class="new-chat-opt w-full flex items-center gap-2.5 px-3 py-2.5 rounded-lg hover:bg-slate-100 dark:hover:bg-white/5 transition-all text-[13px] font-bold text-slate-700 dark:text-text-primary"
                  data-network="testnet"
                >
                  <span
                    class="w-1.5 h-1.5 rounded-full"
                    style="background-color: #00e599"
                  ></span>
                  <span>Testnet</span>
                </button>
              </div>
            </div>
          </div>
        </div>

        <ul class="flex-1 px-3 space-y-0.5">
          <li>
            <a href="#chat" class="nav-link" data-page="chat">
              <svg
                class="w-5 h-5 flex-shrink-0"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
                ></path>
              </svg>
              <span>Chat</span>
            </a>
          </li>
          <li>
            <a href="#wallets" class="nav-link" data-page="wallets">
              <svg
                class="w-5 h-5 flex-shrink-0"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="2" y="4" width="20" height="16" rx="2" />
                <path d="M2 10h20" />
                <path d="M16 14h2" />
              </svg>
              <span>Wallets</span>
            </a>
          </li>
          <li>
            <a href="#history" class="nav-link" data-page="history">
              <svg
                class="w-5 h-5 flex-shrink-0"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
              </svg>
              <span>History</span>
            </a>
          </li>
          <li>
            <a href="#settings" class="nav-link" data-page="settings">
              <svg
                class="w-5 h-5 flex-shrink-0"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="3" />
                <path
                  d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
                />
              </svg>
              <span>Settings</span>
            </a>
          </li>
        </ul>

        <!-- Global Chat List -->
        <div
          class="px-3 py-2 mt-4 border-t border-slate-200 dark:border-border/30 flex-1 flex flex-col min-h-0 overflow-hidden group"
        >
          <div class="flex items-center justify-between mb-3 px-2">
            <h3
              class="text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-text-muted"
            >
              Recent Chats
            </h3>
          </div>
          <div
            id="global-session-list"
            class="flex-1 overflow-y-auto space-y-1 min-h-0 pr-1"
          >
            <!-- Dynamically populated -->
          </div>
        </div>
        <div
          class="px-5 py-4 border-t border-slate-200 dark:border-border"
          id="sidebar-footer"
        >
          <!-- Theme Toggle rendered here -->
        </div>
      </nav>

      <!-- Main Content -->
      <main
        class="flex-1 overflow-y-auto flex flex-col bg-white dark:bg-bg-primary"
        id="app"
      ></main>
    </div>

    <div
      class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center lg:pl-64 z-[100] animate-[modalFadeIn_0.2s_ease]"
      id="approval-modal"
      style="display: none"
    >
      <div
        class="bg-white dark:bg-bg-card border border-slate-200 dark:border-border-light rounded-2xl p-6 w-[90%] max-w-lg shadow-2xl"
      >
        <div class="mb-4">
          <h3 class="text-lg font-bold">⚠️ Approval Required</h3>
        </div>
        <div
          class="text-sm text-slate-600 dark:text-text-secondary leading-relaxed mb-5 font-mono bg-slate-100 dark:bg-bg-primary p-3 rounded-md max-h-[200px] overflow-y-auto whitespace-pre-wrap break-all"
          id="approval-body"
        ></div>
        <div class="flex gap-2.5 justify-end">
          <button class="btn-danger text-sm font-semibold" id="approval-reject">
            Reject
          </button>
          <button
            class="btn-primary text-sm font-semibold"
            id="approval-confirm"
          >
            Confirm Action
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
    <script>
      // Handle the sidebar responsive logic here as a fallback
      const toggle = document.getElementById("sidebar-toggle");
      const sidebar = document.getElementById("sidebar");
      const close = document.getElementById("sidebar-close");
      const overlay = document.getElementById("sidebar-overlay");

      if (toggle && sidebar) {
        toggle.addEventListener("click", () => {
          sidebar.classList.add("open");
          sidebar.classList.remove("-translate-x-full");
          overlay.classList.remove("hidden");
        });
      }
      if (close && sidebar) {
        close.addEventListener("click", () => {
          sidebar.classList.remove("open");
          sidebar.classList.add("-translate-x-full");
          overlay.classList.add("hidden");
        });
      }
      if (overlay && sidebar) {
        overlay.addEventListener("click", () => {
          sidebar.classList.remove("open");
          sidebar.classList.add("-translate-x-full");
          overlay.classList.add("hidden");
        });
      }
    </script>
  </body>
</html>
